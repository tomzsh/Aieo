# Minimal Supabase CLI config for Aieo migrations.
# Full local stack: install Supabase CLI then run `supabase start`.

project_id = "aieo"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323
